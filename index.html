<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page No Longer Available</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1714;
      --muted: #8a8178;
      --accent: #c0392b;
      --line: #d6d0c8;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .rule {
      height: 1px;
      background: var(--ink);
      width: 100%;
      margin-bottom: 2.5rem;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    h1 em {
      font-style: italic;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 2rem 0;
    }

    p {
      font-size: 0.8rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    a.cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.2rem;
      transition: color 0.2s, border-color 0.2s;
    }

    a.cta:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    a.cta::after {
      content: '→';
      transition: transform 0.2s;
    }

    a.cta:hover::after {
      transform: translateX(4px);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--line);
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rule"></div>
    <p class="label">Tyler Hagan — Portfolio</p>
    <h1>This version is <em>no longer</em> available.</h1>
    <div class="divider"></div>
    <p>
      This page has been retired. The new site is live
      and waiting for you at the address below.
    </p>
    <a class="cta" href="https://tylerhagan.co.uk/">tylerhagan.co.uk</a>
    <div class="footer">Please update your bookmarks</div>
  </div>
</body>
</html>
